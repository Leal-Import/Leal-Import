<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/modules/employees/employees.css">
    <link rel="stylesheet" href="../css/utils/pagination.css">
    <link rel="stylesheet" href="../css/utils/controls/controls.css">
    <link rel="stylesheet" href="../css/utils/floatingMenu.css">
    <link rel="stylesheet" href="../css/utils/showData/table.css">
    <link rel="stylesheet" href="../css/utils/modals/modal.css">
    <link rel="stylesheet" href="../css/utils/loaders/loader.css">
    <link rel="stylesheet" href="../css/utils/darkMode.css">

    <script src="../js/utils/dark.mode.init.js"></script>
    <title>Empleados</title>
</head>

<body>
    <div class="containerMobileHeader"></div>
    <div class="bodyContent">
        <div class="containerModal hide" id="modalEmployees">
            <form class="modalAdd" id="frmEmployees">
                <button id="btnCloseModalEmployee" class="btnClose" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
                        <line x1="10" y1="10" x2="22" y2="22" stroke-width="2.5" stroke-linecap="round" />
                        <line x1="22" y1="10" x2="10" y2="22" stroke-width="2.5" stroke-linecap="round" />
                    </svg>
                </button>
                <h2 class="titleModal">Agregar empleado</h2>
                <div class="modalEmployeeBody">
                    <div class="formGroup">
                        <label for="txtFullName" class="lblInputs">Nombre completo</label>
                        <input type="text" class="txtInputs" name="txtFullName" id="txtFullName" required maxlength="75">
                    </div>
                    <div class="formGroup">
                        <label for="txtEmployeeEmail" class="lblInputs">Correo electronico</label>
                        <input type="text" class="txtInputs" name="txtEmployeeEmail" id="txtEmployeeEmail" required
                            maxlength="125">
                    </div>
                    <div class="formGroup">
                        <label for="txtEmployeePhone" class="lblInputs">Teléfono</label>
                        <input type="text" class="txtInputs" name="txtEmployeePhone" id="txtEmployeePhone" required
                            maxlength="9">
                    </div>
                    <div class="formGroup">
                        <label for="cmbUserRole" class="lblInputs">Rol de usuario</label>
                        <select id="cmbUserRole" name="cmbUserRole" class="txtInputs" required>
                        </select>
                    </div>
                    <div class="formGroup">
                        <label for="txtUsername" class="lblInputs">Usuario</label>
                        <input type="text" class="txtInputs" name="txtUsername" id="txtUsername" required maxlength="30">
                    </div>
                </div>
                <button class="btnPrimary btnSubmitData btnAddData" id="btnAddEmployee">
                    <span>Agregar</span>
                    <div class="loader hide" id="btnAddEmployeeLoader"></div>
                </button>
            </form>
        </div>
        <div class="containerModal hide" id="modalEmployeePrivileges">
            <form class="modalAdd" id="frmEmployeePrivileges">
                <button id="btnCloseModalEmployeePrivileges" class="btnClose" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
                        <line x1="10" y1="10" x2="22" y2="22" stroke-width="2.5" stroke-linecap="round" />
                        <line x1="22" y1="10" x2="10" y2="22" stroke-width="2.5" stroke-linecap="round" />
                    </svg>
                </button>
                <h2 class="titleModal">Permisos de empleado</h2>
                <div class="modalEmployeePermissionsBody">
                    <div class="employeeInfo">
                        <p id="employeePrivilegesName" class="modalSectionSubtitle"></p>
                        <p id="employeePrivilegesRole" class="modalSectionLabel"></p>
                    </div>
                    <div>
                        <p class="modalSectionTitle">Permisos directos</p>
                        <div class="rolesPrivilegesList empty" id="employeePrivilegesList"></div>
                    </div>
                    <div>
                        <p class="modalSectionTitle">Agregar permiso</p>
                        <div class="privilegeButtons" id="employeePrivilegeButtons"></div>
                    </div>
                </div>
            </form>
        </div>
        <div id="sidebar"></div>
        <div class="content">
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a class="breadcrumb">Empleados</a>
                </div>
                <div class="filterSection">
                    <input type="text" id="txtSearchData" class="txtSearchData"
                        placeholder="Buscar empleado">
                    <select id="cmbSearchByRole" class="cmbFilterData">
                        <option value="">Cargando...</option>
                    </select>
                    <select id="cmbSearchByStatus" class="cmbFilterData">
                        <option value="">Buscar por estado</option>
                        <option value="ACTIVE" selected>Activo</option>
                        <option value="INACTIVE">Inactivo</option>
                    </select>
                    <button id="btnOpenModalEmployees" class="btnPrimary btnOpenModal" data-privilege="WRITE_EMPLOYEES">
                        Añadir
                    </button>
                </div>
            </div>
            <div class="containerTable">
                <div class="containerLoader show" style="z-index: 10;" id="loaderEmployees">
                    <div class="loader"></div>
                    <div>Cargando lista de empleados...</div>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Nombre completo</th>
                            <th>Correo</th>
                            <th>Teléfono</th>
                            <th>Rol</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="employeesTableBody"></tbody>
                </table>
            </div>
            <div class="paginationContainer">

                <!-- Info + page size -->
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>

                    <div class="pageSize">
                        <select class="txtInputs" id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15" selected>15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>

                <!-- Page controls -->
                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>

            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/employees/employees.controller.js"></script>
    <script type="module" src="../js/components/sidebar.js"></script>
</body>

</html>
