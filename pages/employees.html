<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/employees.css">
    <link rel="stylesheet" href="../css/pagination.css">
    <title>Empleados</title>
</head>

<body>
    <div class="containerModal hide" id="modalEmployees">
        <form class="modalAdd" id="frmEmployees">
            <button id="closeAddEmployee" class="btnClose" type="button">
                <img src="../media/appMedia/closeIcon.svg" alt="">
            </button>
            <h2 class="titleModal">Agregar empleado</h2>
            <div class="modalEmployeeBody">
                <div class="formGroup">
                    <label for="txtFullName" class="lblInputs">Nombre completo</label>
                    <input type="text" class="txtInputs" id="txtFullName" required maxlength="256">
                </div>
                <div class="formGroup">
                    <label for="txtEmployeeEmail" class="lblInputs">Correo electronico</label>
                    <input type="text" class="txtInputs" id="txtEmployeeEmail" required maxlength="100">
                </div>
                <div class="formGroup">
                    <label for="txtEmployeePhone" class="lblInputs">Teléfono</label>
                    <input type="text" class="txtInputs" id="txtEmployeePhone" required maxlength="9">
                </div>
                <div class="formGroup">
                    <label for="cmbUserRole" class="lblInputs">Rol de usuario</label>
                    <select id="cmbUserRole" class="txtInputs" required>
                    </select>
                </div>
                <div class="formGroup">
                    <label for="txtUsername" class="lblInputs">Usuario</label>
                    <input type="text" class="txtInputs" id="txtUsername" required maxlength="30">
                </div>
            </div>
            <input type="submit" class="btnPrimary btnSubmitData" value="Agregar" id="btnAddEmployee">
        </form>
    </div>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a class="breadcrumb">Empleados</a>
                    <input type="text" id="txtSearchData" class="txtSearchData"
                        placeholder="Buscar por: nombre, correo o teléfono">
                </div>
                <div class="filterSection">
                    <select id="cmbSearchByRole" class="cmbFilterData">
                        <option value="">Buscar por rol</option>
                    </select>
                    <button id="OpenModalEmployees" class="btnPrimary btnOpenModal">Añadir</button>
                </div>
            </div>
            <div class="containerTable">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Nombre completo</th>
                            <th>Correo</th>
                            <th>Teléfono</th>
                            <th>Rol</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="employeesTableBody"></tbody>
                </table>
            </div>
            <div class="paginationContainer">

                <!-- Info + page size -->
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>

                    <div class="pageSize">
                        <select class="txtInputs" id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15" selected>15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>

                <!-- Page controls -->
                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>

            </div>

        </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/utils.js"></script>
    <script type="module" src="../js/controller/controllerEmployees.js"></script>
    <script type="module" src="../js/service/serviceEmployees.js"></script>
</body>

</html>
