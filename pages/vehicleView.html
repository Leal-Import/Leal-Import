<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../css/modules/vehicles/vehicleView.css">
    <link rel="stylesheet" href="../css/utils/darkMode.css">
    <link rel="stylesheet" href="../css/utils/showData/carousel.css">
    <link rel="stylesheet" href="../css/utils/loaders/skeletonLoader.css">

    <script src="../js/utils/dark.mode.init.js"></script>
    <title>Vehiculos</title>
</head>

<body>
    <div class="containerMobileHeader"></div>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <form class="content " id="frmVehicles">
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a href="vehicle.html" class="breadcrumb">Vehiculos &#62; </a>
                    <a class="breadcrumb" id="typeAction">Ver vehiculo</a>
                </div>
            </div>
            <div class="mainContent">
                <div class="vehicleData">
                    <div class="headerData">
                        <h2 class="titleData">Datos del vehiculo</h2>
                    </div>
                    <div class="bodyData">
                        <div class="infoRow">
                            <div class="data skeleton">
                                <span class="lblData">Vin:</span>
                                <span id="vin" class="values"></span>
                            </div>
                            <div class="data skeleton">
                                <span class="lblData">Marca:</span>
                                <span id="brand" class="values"></span>
                            </div>
                        </div>
                        <div class="infoRow">
                            <div class="data skeleton">
                                <span class="lblData">Modelo:</span>
                                <span id="model" class="values"></span>
                            </div>
                            <div class="data skeleton">
                                <span class="lblData">Año:</span>
                                <span id="year" class="values"></span>
                            </div>
                        </div>
                        <div class="infoRow">
                            <div class="data skeleton">
                                <span class="lblData">Millaje:</span>
                                <span id="mileage" class="values"></span>
                            </div>
                            <div class="data skeleton">
                                <span class="lblData">Lote:</span>
                                <a id="lote" style="color: var(--danger-color);" aria-label="Numero de lote"></a>
                            </div>
                        </div>
                        <div class="infoRow">
                            <div class="data skeleton">
                                <span class="lblData">Estado:</span>
                                <span id="status" class="values"></span>
                            </div>
                            <div class="data skeleton">
                                <span class="lblData">Fecha de compra:</span>
                                <span id="purchaseDate" class="values"></span>
                            </div>
                        </div>
                        <div class="data skeleton" style="flex-direction: column; gap: 0; align-items: stretch;">
                            <span class="lblData">Descripción:</span>
                            <textarea id="description" class="values txtAreaSpecific"></textarea>
                        </div>
                    </div>
                </div>
                <div class="imgData">
                    <div class="containerCarousel skeleton">
                        <!-- CARRUSEL -->
                        <div class="swiper" id="mainSwiper">
                            <div class="swiper-wrapper" id="mainSwiperWrapper"></div>
                            <div class="swiper-button-prev"></div>
                            <div class="swiper-button-next"></div>
                        </div>

                        <div class="thumbnailImagesContainer" id="thumbnailImagesContainer">
                            <div class="swiper thumbs-swiper" id="thumbsSwiper">
                                <div class="swiper-wrapper" id="thumbsWrapper"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="costsData">
                    <div class="headerData">
                        <h2 class="titleData">Datos de importación</h2>
                    </div>
                    <div class="bodyData">
                        <div class="infoRow">
                            <div class="data skeleton">
                                <span class="lblData">Factura:</span>
                                <a id="bill" class="values" target="_blank" aria-label="Ver comprobante de factura"></a>
                            </div>
                            <div class="data skeleton">
                                <span class="lblData">Transferencia:</span>
                                <span id="transfer" class="values"></span>
                            </div>
                        </div>
                        <div class="infoRow">
                            <div class="data skeleton">
                                <span class="lblData">Almacenamiento:</span>
                                <span id="storage" class="values"></span>
                            </div>
                            <div class="data skeleton">
                                <span class="lblData">Transporte:</span>
                                <a id="transport" class="values" target="_blank"
                                    aria-label="Ver comprobante de transporte"></a>
                            </div>
                        </div>
                        <div class="infoRow">
                            <div class="data skeleton">
                                <span class="lblData">Barco:</span>
                                <a id="ship" class="values" target="_blank" aria-label="Ver comprobante de barco"></a>
                            </div>
                            <div class="data skeleton">
                                <span class="lblData">Impuestos:</span>
                                <a id="taxes" class="values" target="_blank"
                                    aria-label="Ver comprobante de impuestos"></a>
                            </div>
                        </div>
                        <div class="infoRow">
                            <div class="data skeleton">
                                <span class="lblData">IVA:</span>
                                <span id="iva" class="values"></span>
                            </div>
                            <div class="data skeleton">
                                <span class="lblData">P.A:</span>
                                <span id="pa" class="values"></span>
                            </div>
                        </div>
                        <div class="infoRow">
                            <div class="data skeleton">
                                <span class="lblData">Precio sugerido:</span>
                                <span id="suggestedPrice"></span>
                            </div>
                            <div class="data skeleton">
                                <span class="lblData">Total:</span>
                                <span id="total" class="values"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BARRA DE ACCIONES - NUEVA SECCIÓN -->
            <div class="actionsBar">
                <div class="statusBadge" id="vehicleStatus">
                    <span class="statusDot"></span>
                    <span class="statusText">Disponible</span>
                </div>
                <div class="btnGroup">
                    <button type="button" class="btnPrimary btnAction" id="btnGeneratePdf">
                        <span class="btnIcon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                <polyline points="14 2 14 8 20 8" />
                                <line x1="16" y1="13" x2="8" y2="13" />
                                <line x1="16" y1="17" x2="8" y2="17" />
                                <polyline points="10 9 9 9 8 9" />
                            </svg>
                        </span>
                        <span>Reporte del vehiculo</span>
                    </button>
                    <a type="button" class="btnAction btnSecondary" id="btnEdit">
                        <span class="btnIcon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                            </svg>
                        </span>
                        <span>Editar</span>
                    </a>
                    <a type="button" class="btnAction btnSuccess" id="btnSell">
                        <span class="btnIcon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="12" y1="1" x2="12" y2="23" />
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                            </svg>
                        </span>
                        <span>Vender</span>
                    </a>
                    <a type="button" class="btnAction btnPrimary" id="btnHistorial">
                        <span class="btnIcon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12 6 12 12 16 14" />
                            </svg>
                        </span>
                        <span>Ver Historial</span>
                    </a>
                </div>
            </div>

        </form>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/vehicles/controller/vehicles.view.controller.js"></script>
    <script src="../js/components/sidebar.js"></script>
</body>

</html>
