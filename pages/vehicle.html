<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../css/modules/vehicles/vehicle.css">
    <link rel="stylesheet" href="../css/utils/pagination.css">
    <link rel="stylesheet" href="../css/utils/controls/controls.css">
    <link rel="stylesheet" href="../css/utils/showData/cards.css">
    <link rel="stylesheet" href="../css/utils/loader.css">
    <title>Vehiculos</title>
</head>

<body>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a class="breadcrumb">Vehículos</a>
                </div>

                <!-- Stats Section -->
                <div class="statsSection">
                    <div class="statItem totalVehicle">
                        <div class="statIcon">🚗</div>
                        <div class="statInfo">
                            <p class="statTitle">Total de Vehículos</p>
                            <h2 class="statValue" id="totalVehicles">0</h2>
                        </div>
                    </div>
                    <div class="statItem stockVehicles">
                        <div class="statIcon">📦</div>
                        <div class="statInfo">
                            <p class="statTitle">Vehículos en stock</p>
                            <h2 class="statValue" id="activeVehicles">0</h2>
                        </div>
                    </div>
                    <div class="statItem soldVehicles">
                        <div class="statIcon">✅</div>
                        <div class="statInfo">
                            <p class="statTitle">Vehículos vendidos</p>
                            <h2 class="statValue" id="inactiveVehicles">0</h2>
                        </div>
                    </div>
                    <div class="statItem totalSales">
                        <div class="statIcon">💰</div>
                        <div class="statInfo">
                            <p class="statTitle">Total de ventas</p>
                            <h2 class="statValue" id="totalSalesQuantity">$283,384,384.93</h2>
                        </div>
                    </div>
                    <div class="statItem graphicSection">
                        <div class="graphicContainer">
                            <canvas id="vehicleChart"></canvas>
                        </div>
                        <div class="containerInfoGraphic">
                            <div class="infoGraphicItem">
                                <div class="colorIdGraphic" style="background-color: var(--danger-color);"></div>
                                <span>Vendidos</span>
                            </div>
                            <div class="infoGraphicItem">
                                <div class="colorIdGraphic" style="background-color: var(--helper-color);"></div>
                                <span>En stock</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Filter Section -->
                <div class="filterSection">
                    <div class="filtersGroup">
                        <input type="text" id="txtSearchData" class="txtSearchData"
                            placeholder="Buscar vehículo por VIN, marca o modelo...">
                        <select id="cmbSearchByStatus" class="cmbFilterData">
                            <option value="">Cargando...</option>
                        </select>
                        <input type="text" class="txtSearchData" id="txtSearchYear" maxlength="4" placeholder="Año">
                    </div>
                    <a class="btnPrimary btnOpenModal" id="btnAddVehicle" href="vehicleDetails.html">
                        <span class="btnIcon">+</span>
                        <span>Añadir</span>
                    </a>
                </div>
            </div>

            <!-- Cards Container -->
            <div class="containerVehicles">
                <div class="containerLoader show" style="z-index: 20;" id="loaderVehicles">
                    <div class="loader"></div>
                    <div>Cargando lista de vehiculos...</div>
                </div>
                <div class="cardContainer"></div>
            </div>

            <!-- Pagination -->
            <div class="paginationContainer">
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>
                    <div class="pageSize">
                        <select id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>

                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>
            </div>

        </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="../js/modules/vehicles/controller/vehicles.controller.js"></script>
</body>

</html>
