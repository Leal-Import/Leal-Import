<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/modules/vehicles/vehicle.css">
    <link rel="stylesheet" href="../css/utils/pagination.css">
    <link rel="stylesheet" href="../css/utils/controls/controls.css">
    <link rel="stylesheet" href="../css/utils/showData/cards.css">
    <link rel="stylesheet" href="../css/utils/loaders/loader.css">
    <link rel="stylesheet" href="../css/utils/darkMode.css">

    <script src="../js/utils/dark.mode.init.js"></script>
    <title>Vehiculos</title>
</head>

<body>
    <div class="containerMobileHeader"></div>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="breadCrumbSection">
                <a class="breadcrumb">Vehículos</a>
            </div>

            <!-- Stats Section -->
            <div class="statsSection">
                <div class="statItem stockVehicles">
                    <div class="statInfo">
                        <p class="statTitle">Vehículos en stock</p>
                        <h2 class="statValue" id="activeVehicles">0</h2>
                    </div>
                </div>
                <div class="statItem soldVehicles">
                    <div class="statInfo">
                        <p class="statTitle">Vehículos vendidos</p>
                        <h2 class="statValue" id="inactiveVehicles">0</h2>
                    </div>
                </div>
                <div class="statItem externalVehicles">
                    <div class="statInfo">
                        <p class="statTitle">Vehículos externos</p>
                        <h2 class="statValue" id="externalVehicles">0</h2>
                    </div>
                </div>
                <div class="statItem nonExternalVehicles">
                    <div class="statInfo">
                        <p class="statTitle">Vehículos no externos</p>
                        <h2 class="statValue" id="nonExternalVehicles">0</h2>
                    </div>
                </div>
            </div>

            <!-- Filter Section -->
            <div class="filterSection">
                <div class="containerTexts">
                    <input type="text" style="flex: 5;" id="txtSearchData" class="txtSearchData" placeholder="Buscar vehículo">
                    <input type="text" class="txtSearchData" id="txtSearchYear" maxlength="4" placeholder="Año">
                </div>
                <div class="dateRangeInput">
                    <div class="dateGroup">
                        <label class="dateLbl" for="fromDt">Desde</label>
                        <input type="date" id="fromDt" class="dateInput">
                    </div>
                    <span class="dateSeparator">—</span>
                    <div class="dateGroup">
                        <label class="dateLbl" for="toDt">Hasta</label>
                        <input type="date" id="toDt" class="dateInput">
                    </div>
                </div>
                <select id="cmbSearchByStatus" class="cmbFilterData">
                    <option value="">Cargando...</option>
                </select>
                <select id="cmbSearchByIsExternal" class="cmbFilterData">
                    <option value="">Buscar por tipo</option>
                    <option value="INVENTORY">No externos</option>
                    <option value="EXTERNAL">Externos</option>
                </select>
                <a class="btnPrimary btnOpenModal" id="btnAddVehicle" href="vehiclesForm.html" data-privilege="WRITE_VEHICLES">Añadir</a>
            </div>

            <!-- Cards Container -->
            <div class="containerVehicles">
                <div class="containerLoader show" style="z-index: 20;" id="loaderVehicles">
                    <div class="loader"></div>
                    <div>Cargando lista de vehiculos...</div>
                </div>
                <div class="cardContainer"></div>
            </div>

            <!-- Pagination -->
            <div class="paginationContainer">
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>
                    <div class="pageSize">
                        <select id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>

                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>
            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/vehicles/vehicles.controller.js"></script>
    <script type="module" src="../js/components/sidebar.js"></script>
</body>

</html>
