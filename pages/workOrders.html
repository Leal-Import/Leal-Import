<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/modules/workOrders/workOrders.css">
    <link rel="stylesheet" href="../css/utils/pagination.css">
    <link rel="stylesheet" href="../css/utils/showData/cards.css">
    <link rel="stylesheet" href="../css/utils/controls/controls.css">
    <link rel="stylesheet" href="../css/utils/loaders/loader.css">
    <link rel="stylesheet" href="../css/utils/darkMode.css">

    <script src="../js/utils/dark.mode.init.js"></script>
    <title>Ordenes de trabajo</title>
</head>

<body>
    <div class="containerMobileHeader"></div>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a class="breadcrumb">Ordenes</a>
                </div>
                <div class="statsSection">
                    <div class="statItem totalVehicle">
                        <p class="statTitle">Finalizadas</p>
                        <h2 class="statValue" id="totalVehicles">0</h2>
                    </div>
                    <div class="statItem stockVehicles">
                        <p class="statTitle">Pendientes</p>
                        <h2 class="statValue" id="activeVehicles">0</h2>
                    </div>
                    <div class="statItem soldVehicles">
                        <p class="statTitle">Atrasadas</p>
                        <h2 class="statValue" id="inactiveVehicles">0</h2>
                    </div>
                    <div class="statItem totalSales">
                        <p class="statTitle statValue">Facturado</p>
                        <h2 class="statValue" id="totalSalesQuantity">$283,384,384.93</h2>
                    </div>
                </div>
            </div>
            <div class="filterSection">
                <input type="text" id="txtSearchData" class="txtSearchData" placeholder="Buscar ordenes">
                <div class="dateRangeInput">
                    <div class="dateGroup">
                        <label class="dateLbl" for="fromDt">Desde</label>
                        <input type="date" id="fromDt" class="dateInput">
                    </div>
                    <span class="dateSeparator">—</span>
                    <div class="dateGroup">
                        <label class="dateLbl" for="toDt">Hasta</label>
                        <input type="date" id="toDt" class="dateInput">
                    </div>
                </div>
                <select id="cmbSearchByStatus" class="cmbFilterData">
                    <option value="">Cargando...</option>
                </select>
                <a id="OpenModalVehicles" href="vehicle.html?workOrder=true" class="btnPrimary btnOpenModal">Añadir</a>
            </div>
            <div class="containerWorkOrder">
                <div class="containerLoader show" style="z-index: 10;" id="loaderWorkOrders">
                    <div class="loader"></div>
                    <div>Cargando lista de ordenes de trabajo...</div>
                </div>
                <div class="cardContainer"></div>
            </div>
            <div class="paginationContainer">

                <!-- Info + page size -->
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>

                    <div class="pageSize">
                        <select class="txtInputs" id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10">10</option>
                            <option value="15" selected>15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>

                <!-- Page controls -->
                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/modules/workOrders/controller/workOrder.controller.js" type="module"></script>
    <script src="../js/components/sidebar.js"></script>
</body>

</html>
