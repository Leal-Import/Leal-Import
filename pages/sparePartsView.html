<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/modules/spareParts/sparePartsView.css">
    <link rel="stylesheet" href="../css/utils/darkMode.css">
    <link rel="stylesheet" href="../css/utils/loaders/skeletonLoader.css">

    <script src="../js/utils/dark.mode.init.js"></script>
    <title>Repuestos</title>
</head>

<body>
    <div class="containerMobileHeader"></div>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="headerContent">
                <div class="breadcrumbSection">
                    <a href="spareParts.html" class="breadcrumb">Repuestos &#62; </a>
                    <a class="breadcrumb" id="typeAction">Ver repuesto</a>
                </div>
            </div>
            <div class="mainContainer">
                <div class="pictureSection">
                    <div class="containerImgSparePart skeleton">
                        <img src="../media/appMedia/defaultImg.svg" alt="" id="pictureSparePart">
                    </div>
                </div>
                <div class="dataSection">
                    <div class="contentDataSection">
                        <div class="sparePartData">
                            <h2 class="titleData">Datos del repuesto</h2>
                            <div class="sparePartDataBody">
                                <div class="dataInfo skeleton">
                                    <span class="label">Nombre:</span>
                                    <a id="name" class="value redColor" target="_blank" aria-label="Nombre del repuesto"></a>
                                </div>
                                <div class="dataInfo skeleton">
                                    <span class="label">Marca:</span>
                                    <span id="brand" class="value" aria-label="Marca del repuesto"></span>
                                </div>
                                <div class="dataInfo skeleton">
                                    <span class="label">Modelo:</span>
                                    <span id="model" class="value" aria-label="Modelo del repuesto"></span>
                                </div>
                                <div class="dataInfo skeleton">
                                    <span class="label">Año:</span>
                                    <span id="year" class="value" aria-label="Año del repuesto"></span>
                                </div>
                                <div class="dataInfo skeleton">
                                    <span class="label">Estado:</span>
                                    <span id="status" class="value" aria-label="Estado del repuesto"></span>
                                </div>
                                <div class="dataInfo skeleton">
                                    <span class="label">Precio sugerido:</span>
                                    <span id="suggestedPrice" class="value redColor" aria-label="Precio sugerido del repuesto"></span>
                                </div>
                            </div>
                        </div>
                        <div class="sparePartCost">
                            <h2 class="titleData">Costos</h2>
                            <div class="sparePartCostBody">
                                <div class="dataInfo skeleton">
                                    <span class="label">Tracking:</span>
                                    <a id="tracking" class="value redColor" target="_blank" aria-label="Numero de tracking"></a>
                                </div>
                                <div class="dataInfo skeleton">
                                    <span class="label">Precio de compra:</span>
                                    <span id="purchasePrice" class="value" aria-label="Precio de compra del repuesto"></span>
                                </div>
                                <div class="dataInfo skeleton">
                                    <span class="label">Impuestos:</span>
                                    <span id="taxes" class="value" aria-label="Impuestos del repuesto"></span>
                                </div>
                                <div class="dataInfo skeleton">
                                    <span class="label">Costo total:</span>
                                    <span id="totalCost" class="value redColor" aria-label="Costo total del repuesto"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BARRA DE ACCIONES -->
            <div class="actionsBarSparePart">
                <div class="statusBadgeSparePart aviable">
                    <span class="statusDotSparePart"></span>
                    <span class="statusTextSparePart">Disponible</span>
                </div>
                <div class="btnGroupSparePart">
                    <button type="button" class="btnActionSparePart btnDangerSparePart" id="btnGeneratePdf">
                        <span class="btnIconSparePart">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                <polyline points="14 2 14 8 20 8" />
                                <line x1="16" y1="13" x2="8" y2="13" />
                                <line x1="16" y1="17" x2="8" y2="17" />
                                <polyline points="10 9 9 9 8 9" />
                            </svg>
                        </span>
                        <span>Reporte del repuesto</span>
                    </button>
                    <a type="button" class="btnActionSparePart btnSecondarySparePart" id="btnEditSparePart">
                        <span class="btnIconSparePart">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                            </svg>
                        </span>
                        <span>Editar</span>
                    </a>
                    <a type="button" class="btnActionSparePart btnDangerSparePart" id="btnSellSparePart">
                        <span class="btnIconSparePart">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="12" y1="1" x2="12" y2="23" />
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                            </svg>
                        </span>
                        <span>Vender</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/spareParts/controller/spareParts.view.controller.js"></script>
    <script src="../js/components/sidebar.js"></script>
</body>

</html>
