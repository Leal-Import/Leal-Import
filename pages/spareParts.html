<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/modules/spareParts/spareParts.css">
    <link rel="stylesheet" href="../css/utils/pagination.css">
    <link rel="stylesheet" href="../css/globalStyles.css">
    <link rel="stylesheet" href="../css/utils/controls/controls.css">
    <link rel="stylesheet" href="../css/utils/showData/cards.css">
    <link rel="stylesheet" href="../css/utils/loader.css">
    <title>Repuestos</title>
</head>

<body>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="containerMobileHeader"></div>
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a class="breadcrumb">Repuestos</a>
                </div>
                <div class="dataCardContainer">
                    <div class="seccionCard" id="Stock">
                        <h2 class="statValue">10,000</h2>
                        <p class="statTitle">En Stock</p>
                    </div>
                    <div class="seccionCard" id="Requested">
                        <h2 class="statValue">5,565</h2>
                        <p class="statTitle">Solicitado</p>
                    </div>
                    <div class="seccionCard" id="TotalCost">
                        <h2 class="statValue">$4,360.20</h2>
                        <p class="statTitle">Valor de inventario</p>
                    </div>
                    <div class="filterSectionParts">
                        <div class="filterSection">
                            <div class="filterContainer">
                                <input type="text" id="txtSearchData" class="txtSearchData"
                                    placeholder="Buscar por: nombre, marca, modelo o año">
                                <select id="cmbSearchByStatus" class="cmbFilterData">
                                    <option value="">Cargando...</option>
                                </select>
                            </div>
                            <a href="sparePartsDetails.html" class="btnPrimary btnOpenModal">Añadir</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="containerSpareParts">
                <div class="containerLoader show" style="z-index: 20;" id="loaderSpareParts">
                    <div class="loader"></div>
                    <div>Cargando lista de repuestos...</div>
                </div>
                <div class="cardContainer"></div>
            </div>
            <div class="paginationContainer">
                <!-- Info + page size -->
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>
                    <div class="pageSize">
                        <select class="txtInputs" id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15" selected>15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>
                <!-- Page controls -->
                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/spareParts/controller/spareParts.controller.js"></script>
</body>

</html>
