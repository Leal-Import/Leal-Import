<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/spareParts.css">
    <link rel="stylesheet" href="../css/pagination.css">
    <title>Repuestos</title>
</head>

<body>
    <div class="containerModal hide" id="modalSpareParts">
        <form class="modalAdd">
            <div class="headContentModal">
                <button id="closeAddEmployee" type="button" class="btnClose">
                    <img src="../media/appMedia/closeIcon.svg" alt="Boton cerrar modal">
                </button>
                <div class="breadCrumbSeccionModal">
                    <h2 class="breadcrumbModal">
                        <img src="../media/appMedia/BoxParts.svg" alt="icono repuesto" class="iconModal">
                        Registrar un nuevo repuesto
                    </h2>
                    <p class="date">Última actualización: <span id="lastUpdateDate">29 oct 2025</span></p>
                </div>
            </div>
            <div action="" class="formModal">
                <div class="seccionGrid">
                    <div class="partsImg">
                        <div class="borderImg">
                            <img src="../media/appMedia/defaultImg.svg" alt="Imagen previa" class="previewimg">
                            <input type="file" class="inputFileImg" id="fileInput" hidden>
                        </div>
                        <div class="btnGroup">
                            <button type="button" class="btn btnPrimary">Subir foto</button>
                            <button type="button" class="btn btnDelete">Eliminar</button>
                        </div>
                    </div>
                    <div class="formInputs">
                        <div class="formGroup">
                            <label for="" class="lblInputs">Nombre</label>
                            <input type="text" class="txtInputs" placeholder="Filtro de aire" required>
                        </div>
                        <div class="formGroup">
                            <label for="" class="lblInputs">Marca</label>
                            <input type="text" class="txtInputs" placeholder="Yamaha" required>
                        </div>
                        <div class="formGroup">
                            <label for="" class="lblInputs">Año</label>
                            <input type="text" class="txtInputs" placeholder="2025" required>
                        </div>
                    </div>
                </div>
                <div class="seccionGrid2">
                    <div class="formGroup">
                        <label for="descripcion" class="lblInputs">Descripción</label>
                        <textarea class="txtInputs descripcion" placeholder="Yamaha" required></textarea>
                    </div>
                    <div class="formGroupGrid">
                        <div class="inputGroup">
                            <label for="tipo" class="lblInputs">Tipo de repuesto</label>
                            <select class="selectInput" required>
                                <option value="Mecanica">Mecánica</option>
                                <option value="Electrica">Eléctrica</option>
                            </select>
                        </div>
                        <div class="inputGroup">
                            <label for="precio" class="lblInputs">Precio</label>
                            <input type="number" step="0.01" min="0" placeholder="0.00" class="txtInputs" required>
                        </div>
                        <div class="inputGroup">
                            <label for="stock" class="lblInputs">Stock</label>
                            <input type="number" class="txtInputs" placeholder="150" required>
                        </div>
                    </div>
                    <div class="formGroup radioGroup">
                        <div class="radioOptions">
                            <label class="lblInputs">
                                <input type="radio" name="estado" value="nuevo"> Nuevo
                            </label>
                            <label class="lblInputs">
                                <input type="radio" name="estado" value="reparado"> Reparado
                            </label>
                        </div>
                    </div>
                </div>
                <div class="btnGroupModal">
                    <input type="submit" class="btn btnPrimary" value="Guardar">
                </div>
            </div>
        </form>
    </div>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a class="breadcrumb">Repuestos</a>
                </div>
                <div class="dataCardContainer">
                    <div class="seccionCard" id="Stock">
                        <h2 class="statValue">10,000</h2>
                        <p class="statTitle">En Stock</p>
                    </div>
                    <div class="seccionCard" id="Requested">
                        <h2 class="statValue">5,565</h2>
                        <p class="statTitle">Solicitado</p>
                    </div>
                    <div class="seccionCard" id="TotalCost">
                        <h2 class="statValue">$4,360.20</h2>
                        <p class="statTitle">Valor de inventario</p>
                    </div>
                    <div class="filterSectionParts">
                        <div class="filterSection">
                            <div class="filterContainer">
                                <input type="text" id="txtSearchData" class="txtSearchData"
                                    placeholder="Buscar por: nombre, marca, modelo o año">
                                <select id="cmbSearchByStatus" class="cmbFilterData">
                                    <option value="">Filtrar por estado</option>
                                </select>
                                <a href="sparePartsDetails.html" class="btnPrimary btnOpenModal"
                                    style="display: grid; place-content: center; text-decoration: none;">Añadir</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="cardContainer"></div>
            <div class="paginationContainer">

                <!-- Info + page size -->
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>

                    <div class="pageSize">
                        <select class="txtInputs" id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15" selected>15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>

                <!-- Page controls -->
                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>

            </div>
        </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/spareParts/controller/spareParts.controller.js"></script>
</body>

</html>
