<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/modules/spareParts/spareParts.css">
    <link rel="stylesheet" href="../css/utils/pagination.css">
    <link rel="stylesheet" href="../css/utils/controls/controls.css">
    <link rel="stylesheet" href="../css/utils/showData/cards.css">
    <link rel="stylesheet" href="../css/utils/loaders/loader.css">
    <link rel="stylesheet" href="../css/utils/darkMode.css">

    <script src="../js/utils/dark.mode.init.js"></script>
    <title>Repuestos</title>
</head>

<body>
    <div class="containerMobileHeader"></div>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a class="breadcrumb">Repuestos</a>
                </div>
                <div class="dataCardContainer">
                    <div class="seccionCard" id="stock">
                        <h2 class="statValue">0</h2>
                        <p class="statTitle">En Stock</p>
                    </div>
                    <div class="seccionCard" id="requested">
                        <h2 class="statValue">0</h2>
                        <p class="statTitle">Reservadas</p>
                    </div>
                    <div class="seccionCard" id="sold">
                        <h2 class="statValue">0</h2>
                        <p class="statTitle">Vendidas</p>
                    </div>
                    <div class="seccionCard" id="returned">
                        <h2 class="statValue">0</h2>
                        <p class="statTitle">Devueltas</p>
                    </div>
                </div>
            </div>
            <div class="filterSection">
                <input type="text" id="txtSearchData" class="txtSearchData" placeholder="Buscar repuestos">
                <div class="dateRangeInput">
                    <div class="dateGroup">
                        <label class="dateLbl" for="fromDt">Desde</label>
                        <input type="date" id="fromDt" class="dateInput">
                    </div>
                    <span class="dateSeparator">—</span>
                    <div class="dateGroup">
                        <label class="dateLbl" for="toDt">Hasta</label>
                        <input type="date" id="toDt" class="dateInput">
                    </div>
                </div>
                <select id="cmbSearchByStatus" class="cmbFilterData">
                    <option value="">Cargando...</option>
                </select>
                <a href="sparePartsForm.html" class="btnPrimary btnOpenModal" data-privilege="WRITE_SPAREPARTS">Añadir</a>
            </div>

            <div class="containerSpareParts">
                <div class="containerLoader show" style="z-index: 20;" id="loaderSpareParts">
                    <div class="loader"></div>
                    <div>Cargando lista de repuestos...</div>
                </div>
                <div class="cardContainer"></div>
            </div>
            <div class="paginationContainer">
                <!-- Info + page size -->
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>
                    <div class="pageSize">
                        <select class="txtInputs" id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15" selected>15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>
                <!-- Page controls -->
                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/spareParts/spareParts.controller.js"></script>
    <script type="module" src="../js/components/sidebar.js"></script>
</body>

</html>
