<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/modules/sparePartsSale/sparePartSale.css">
    <link rel="stylesheet" href="../css/utils/salesStyles/panelSalesStyles.css">
    <link rel="stylesheet" href="../css/utils/salesStyles/tableSales.css">
    <link rel="stylesheet" href="../css/utils/pagination.css">
    <link rel="stylesheet" href="../css/utils/table.css">
    <link rel="stylesheet" href="../css/utils/controls.css">
    <link rel="stylesheet" href="../css/globalStyles.css">
    <link rel="stylesheet" href="../css/utils/salesStyles/tableSelected.css">
    <link rel="stylesheet" href="../css/utils/loader.css">
    <title>Agregar venta</title>
</head>

<body>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="leftColumn">
                <div class="headerContent">
                    <div class="breadCrumbSection">
                        <a href="sales.html" class="breadcrumb">Ventas ></a>
                        <a class="breadcrumb" id="customerName">Cargando...</a>
                    </div>
                    <div class="filterSection">
                        <input type="text" id="txtSearchData" class="txtSearchData"
                            placeholder="Buscar por: nombre, marca o modelo">
                        <a class="btnPrimary btnOpenModal" id="btnOrderPart">Realizar encargo</a>
                    </div>
                </div>
                <div class="tableContainer">
                    <div class="containerLoader show" style="z-index: 20;" id="loaderSpareParts">
                        <div class="loader"></div>
                        <div>Cargando lista de repuestos...</div>
                    </div>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Repuesto</th>
                                <th>Costo</th>
                                <th>P. sugerido</th>
                            </tr>
                        </thead>
                        <tbody id="tBodyInventory"></tbody>
                    </table>
                </div>
                <div class="paginationContainer">

                    <!-- Info + page size -->
                    <div class="paginationLeft">
                        <span class="paginationInfo"></span>

                        <div class="pageSize">
                            <select class="txtInputs" id="sizeSelect">
                                <option value="5">5</option>
                                <option value="10" selected>10</option>
                                <option value="15">15</option>
                                <option value="20">20</option>
                                <option value="30">30</option>
                            </select>
                            <span>por página</span>
                        </div>
                    </div>

                    <!-- Page controls -->
                    <div class="paginationRight">
                        <button class="pageBtn prev">‹</button>
                        <button class="pageBtn next">›</button>
                    </div>

                </div>
            </div>
            <div class="rightColumn">
                <form class="formRightColumn" id="frmSparePartSale">
                    <div class="headerPanel">
                        <h3 class="titlePanel">Repuestos añadidos</h3>
                    </div>
                    <div class="tableContainerSelected">
                        <table class="tableSelected">
                            <thead>
                                <tr>
                                    <th class="sparePartName itemName">Repuesto</th>
                                    <th class="finalPrice">Precio final</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="tBodySelected">
                                <tr class="rowNoData">
                                    <td colspan="2" style="height: 100%;" class="noDataMessage">No hay repuestos
                                        seleccionados</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="headerPanel">
                        <h3 class="titlePanel">Resumen de Pago</h3>
                        <p class="subtitlePanel">Gestiona los abonos y métodos de pago</p>
                    </div>
                    <!-- Payment Form -->
                    <div class="paymentForm">
                        <div class="formGroup">
                            <label class="lblInputs" for="txtAmount">Abono</label>
                            <input type="text" class="txtInputs" placeholder="Abono" id="txtAmount">
                        </div>
                        <div class="formGroup">
                            <label class="lblInputs" for="paymentMethod">Método de pago</label>
                            <select name="paymentMethod" class="txtInputs" id="paymentMethod">
                                <option value="">Cargando...</option>
                            </select>
                        </div>
                        <button id="btnAddPayment" class="btnPrimary btnAddPayment" type="button">Añadir abono</button>
                    </div>

                    <!-- Payments List -->
                    <div class="paymentsList" id="paymentsList"></div>

                    <!-- Summary -->
                    <div class="summarySection">
                        <div class="summaryRow">
                            <span class="summaryLabel">Total:</span>
                            <span class="summaryValue" id="totalSale">$0.00</span>
                        </div>
                        <div class="summaryRow">
                            <span class="summaryLabel">Total abonado:</span>
                            <span class="summaryValue" id="totalPaid">$0.00</span>
                        </div>
                        <div class="summaryRow">
                            <span class="summaryLabel">Deuda:</span>
                            <span class="summaryValue summaryTotal" id="due">$0.00</span>
                        </div>
                    </div>

                    <!-- Additional Notes -->
                    <div class="formGroup">
                        <label class="lblInputs" for="txtNotes">Notas adicionales</label>
                        <textarea class="txtInputs" id="txtNotes" placeholder="Agrega notas sobre la venta..."
                            rows="4"></textarea>
                    </div>

                    <!-- Action Buttons -->
                    <div class="actionButtons">
                        <div></div>
                        <button class="btnPrimary" id="btnSaveSale">Vender</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/sparePartsSales/controller/spareParts.sales.controller.js"></script>
</body>

</html>
