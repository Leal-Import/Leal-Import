<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/utils/darkMode.css">
    <link rel="stylesheet" href="../css/modules/configuration/configuration.css">
    <link rel="stylesheet" href="../css/utils/controls/toggleSwitch.css">

    <script src="../js/utils/dark.mode.init.js"></script>
    <title>Configuración</title>
</head>

<body>
    <div class="containerMobileHeader"></div>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a class="breadcrumb">Configuración</a>
                </div>
            </div>
            <div class="bodySection">

                <!-- Cuenta -->
                <div class="configSectionTitle">Cuenta</div>

                <div class="configCard">
                    <!-- Editar perfil -->
                    <div class="configRow" id="btnEditProfile">
                        <div class="containerIconDarkMode">
                            <div class="configItemIcon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                    <circle cx="12" cy="7" r="4" />
                                </svg>
                            </div>
                            <div class="configItemText">
                                <span class="configItemLabel">Editar perfil</span>
                                <span class="configItemSub">Cambia tu nombre o correo electrónico</span>
                            </div>
                        </div>
                        <svg class="configChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6" />
                        </svg>
                    </div>

                    <div class="configDivider"></div>

                    <!-- Cambiar contraseña -->
                    <div class="configRow" id="btnChangePassword">
                        <div class="containerIconDarkMode">
                            <div class="configItemIcon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" />
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                </svg>
                            </div>
                            <div class="configItemText">
                                <span class="configItemLabel">Cambiar contraseña</span>
                                <span class="configItemSub">Actualiza tu contraseña de acceso</span>
                            </div>
                        </div>
                        <svg class="configChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6" />
                        </svg>
                    </div>
                </div>
                <!-- Modo Oscuro -->
                <div class="configSectionTitle">Apariencia</div>
                <div class="darkModeContainer">
                    <div class="infoDarkContainer">
                        <div class="containerIconDarkMode">
                            <div class="configItemIcon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round">
                                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 07 0 0 0 21 12.70z" />
                                </svg>
                            </div>
                            <span>Modo Oscuro</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="darkModeToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Sesión -->
                <div class="configSectionTitle">Sesión</div>

                <div class="configCard">
                    <div class="configRow configRowDanger" id="btnLogout">
                        <div class="containerIconDarkMode">
                            <div class="configItemIcon configItemIconDanger">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                    <polyline points="16 17 21 12 16 7" />
                                    <line x1="21" y1="12" x2="9" y2="12" />
                                </svg>
                            </div>
                            <div class="configItemText">
                                <span class="configItemLabel configItemLabelDanger">Cerrar sesión</span>
                                <span class="configItemSub">Salir de tu cuenta actual</span>
                            </div>
                        </div>
                        <svg class="configChevron configChevronDanger" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6" />
                        </svg>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script type="module" src="../js/modules/config/configuration.controller.js"></script>
</body>

</html>
