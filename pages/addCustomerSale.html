<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/modules/sales/addCustomerSale.css">
    <link rel="stylesheet" href="../css/utils/pagination.css">
    <link rel="stylesheet" href="../css/utils/controls.css">
    <link rel="stylesheet" href="../css/globalStyles.css">
    <link rel="stylesheet" href="../css/utils/loader.css">
    <title>Agregar cliente</title>
</head>

<body>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a href="sales.html" class="breadcrumb">Ventas ></a>
                    <a class="breadcrumb">Agregar cliente</a>
                </div>
                <div class="filterSection">
                    <input type="text" id="txtSearchData" class="txtSearchData"
                        placeholder="Buscar por: nombre, DUI o teléfono">
                </div>
            </div>
            <div class="customersContainer">
                <div class="containerLoader show" style="z-index: 20;" id="loaderCustomers">
                    <div class="loader"></div>
                    <div>Cargando lista de clientes...</div>
                </div>
                <div class="cardContainer"></div>
            </div>
            <div class="paginationContainer">
                <!-- Info + page size -->
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>
                    <div class="pageSize">
                        <select id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15" selected>15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>
                <!-- Page controls -->
                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/customerSale/customer.sale.controller.js"></script>
</body>

</html>
