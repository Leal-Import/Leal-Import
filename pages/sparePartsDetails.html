<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../css/sparePartsDetails.css">
    <title>Repuestos</title>
</head>

<body>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <form class="content" id="frmSpareParts">
            <div class="headerContent">
                <div class="breadcrumbSection">
                    <a href="spareParts.html" class="breadcrumb">Repuestos ></a>
                    <a class="breadcrumb" id="typeAction">Agregar repuesto</a>
                </div>
            </div>
            <div>
                <div class="modalAdd hide" id="modalLinkName">
                    <button class="btnClose" type="button" id="btnCloseBill">
                        <img src="../media/appMedia/closeIcon.svg" alt="">
                    </button>
                    <h2 class="titleModal">Agregar enlace de la factura</h2>
                    <input type="text" id="txtLinkName" class="txtInputs"
                        placeholder="Pega tu url aqui ej: https://www.ejemplo.com/lote/45" maxlength="1000">
                    <button class="btnPrimary btnSubmitData" id="btnSaveBill" type="button">Guardar enlace</button>
                </div>
                <div class="modalAdd hide" id="modalLinkTracking">
                    <button class="btnClose" type="button" id="btnCloseTracking">
                        <img src="../media/appMedia/closeIcon.svg" alt="">
                    </button>
                    <h2 class="titleModal">Agregar enlace del tracking</h2>
                    <input type="text" id="txtLinkTracking" class="txtInputs"
                        placeholder="Pega tu url aqui ej: https://www.ejemplo.com/lote/45" maxlength="1000">
                    <button class="btnPrimary btnSubmitData" id="btnSaveTracking" type="button">Guardar enlace</button>
                </div>
                <fieldset class="sparePartData">
                    <legend>Datos del repuesto</legend>
                    <div class="rowFields">
                        <div class="formGroup" style="position: relative;">
                            <label for="txtPartName" class="lblInputs">Nombre</label>
                            <input type="text" class="txtInputs" id="txtPartName" maxlength="250">
                            <button class="btnLink btnPrimary" type="button" id="btnOpenLinkBill">Enlace</button>
                        </div>
                        <div class="formGroup">
                            <label for="txtPartBrand" class="lblInputs">Marca</label>
                            <input type="text" class="txtInputs" id="txtPartBrand" maxlength="50">
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtPartModel" class="lblInputs">Modelo</label>
                            <input type="text" class="txtInputs" id="txtPartModel" maxlength="50">
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtPartYear" class="lblInputs">Año</label>
                            <input type="text" class="txtInputs" id="txtPartYear" maxlength="15">
                        </div>
                        <div class="formGroup">
                            <label for="cmbPartStatus" class="lblInputs">Estado</label>
                            <select id="cmbPartStatus" class="txtInputs"></select>
                        </div>
                    </div>
                </fieldset>
                <div class="imgData">
                    <div class="containerImgPart" id="dropZone">
                        <span id="placeholderMsg">Arrastra una imagen aquí o haz clic en "Añadir"</span>
                        <img id="imgPart" style="display: none;">
                    </div>

                    <div class="containerActionsImg">
                        <button class="btnPrimary" type="button" id="btnAddImg">Añadir</button>
                        <button class="btnSecondary" type="button" id="btnDeleteImg">Eliminar</button>
                    </div>

                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>

                <fieldset class="costsData">
                    <legend>Costos de importacion</legend>
                    <div class="rowFields">
                        <div class="formGroup" style="position: relative;">
                            <label for="txtTracking" class="lblInputs">Tracking</label>
                            <input type="text" class="txtInputs" id="txtTracking" maxlength="11">
                            <button class="btnLink btnPrimary" type="button" id="btnOpenLinkTracking">Enlace</button>
                        </div>
                        <div class="formGroup">
                            <label for="txtPurchasePrice" class="lblInputs">Precio de compra</label>
                            <input type="text" class="txtInputs txtCosts" id="txtPurchasePrice" maxlength="11">
                        </div>
                        <div class="formGroup">
                            <label for="txtTaxes" class="lblInputs">Impuestos</label>
                            <input type="text" class="txtInputs txtCosts" id="txtTaxes" maxlength="11">
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtSuggestedPrice" class="lblInputs">Precio sugerido</label>
                            <input type="text" class="txtInputs" id="txtSuggestedPrice" maxlength="11">
                        </div>
                        <div class="formGroup">
                            <label for="txtTotalCost" class="lblInputs">Costo total</label>
                            <input type="text" class="txtInputs" id="txtTotalCost" maxlength="11" disabled>
                        </div>
                    </div>
                </fieldset>
            </div>
            <input type="submit" value="Guardar" class="btnPrimary btnSubmitData" style="padding: 10px 40px;">
        </form>
        <script src="../js/sidebar.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script type="module" src="../js/utils.js"></script>
        <script type="module" src="../js/service/serviceSparePartsDetails.js"></script>
        <script type="module" src="../js/controller/controllerSparePartsDetails.js"></script>
</body>

</html>
