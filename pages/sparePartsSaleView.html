<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/sparePartsSaleView.css">
    <link rel="stylesheet" href="../css/salesStyles/panelSalesStyles.css">

    <title>Ver venta</title>
</head>

<body>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="leftColumn">
                <div class="headerContent">
                    <div class="breadCrumbSection">
                        <a href="sales.html" class="breadcrumb">Ventas ></a>
                        <a class="breadcrumb" id="customerName"></a>
                    </div>
                    <div class="saleGenInfoSec">
                        <div class="infoRow">
                            <div class="infoItem itemLarge">
                                <span class="lbl">Vendedor:</span>
                                <span class="infoValue" id="employeeName">Cristian volodimir zelinsky</span>
                            </div>
                            <div class="infoItem">
                                <span class="lbl">Fecha:</span>
                                <span class="infoValue" id="dateSale">20/10/2025</span>
                            </div>
                        </div>
                        <div class="infoRow">
                            <div class="infoItem itemLarge">
                                <span class="lbl">Cliente:</span>
                                <span class="infoValue" id="customerName">Juan Jose Guzman</span>
                            </div>
                            <div class="infoItem">
                                <span class="lbl">Estado:</span>
                                <span class="infoValue" id="saleStatus">Vendido</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tableContainer">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Repuesto</th>
                                <th>Costo</th>
                                <th>P. Final</th>
                            </tr>
                        </thead>
                        <tbody id="tBodyInventory"></tbody>
                    </table>
                </div>
            </div>
            <form class="rightColumn" id="frmSparePartSale">
                <div class="headerRightColumn">
                    <h2>Resumen de pagos</h2>
                    <div class="tableContainer">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th class="tdAmount">Monto</th>
                                    <th class="tdTypeAmount">Tipo de pago</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="tdAmount">$40.00</td>
                                    <td class="tdTypeAmount">Cheque</td>
                                </tr>
                                <tr>
                                    <td class="tdAmount">$40.00</td>
                                    <td class="tdTypeAmount">Cheque</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="bodyRightColumn">
                    <div class="infoItem">
                        <div class="lbl">total:</div>
                        <div class="infoValue" id="total">$10,000</div>
                    </div>
                    <div class="infoItem">
                        <div class="lbl">Abonado:</div>
                        <div class="infoValue" id="totalAmount">$7,000</div>
                    </div>
                    <div class="infoItem">
                        <div class="lbl">Deuda:</div>
                        <div class="infoValue" id="amountDue">$3,000</div>
                    </div>
                </div>
                <div class="footerRightColumn">
                    <div class="formGroup">
                        <label for="txtNotes" class="lblInp">Notas adicionales</label>
                        <textarea id="txtNotes" class="txtInputs"></textarea>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/utils.js"></script>
    <script type="module" src="../js/controller/controllerSparePartSale.js"></script>
</body>

</html>
