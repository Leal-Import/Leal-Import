<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/sparePartsSaleView.css">
    <link rel="stylesheet" href="../css/salesStyles/salesViewHeader.css">
    <link rel="stylesheet" href="../css/salesStyles/panelSalesStyles.css">
    <link rel="stylesheet" href="../css/salesStyles/viewSalesStat.css">
    <link rel="stylesheet" href="../css/salesStyles/tableSales.css">
    <title>Ver venta</title>
</head>

<body>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="leftColumn">
                <div class="headerContent">
                    <div class="breadCrumbSection">
                        <a href="sales.html" class="breadcrumb">Ventas ></a>
                        <a class="breadcrumb" id="customerName"></a>
                        <span class="infoValue saleStatus pendingStatus" id="saleStatus">Pendiente</span>
                    </div>
                    <div class="saleGenInfoSec">
                        <div class="infoItem itemLarge">
                            <span class="lbl">Vendedor:</span>
                            <span class="infoValue" id="employeeName"></span>
                        </div>
                        <div class="infoItem">
                            <span class="lbl">Fecha:</span>
                            <span class="infoValue" id="dateSale"></span>
                        </div>
                    </div>
                </div>
                <div class="tableContainer">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Repuesto</th>
                                <th>Costo</th>
                                <th>P. Final</th>
                            </tr>
                        </thead>
                        <tbody id="tBodyInventory"></tbody>
                    </table>
                </div>
            </div>
            <form class="rightColumn" id="frmSparePartSale">
                <div class="headerRightColumn">
                    <h2>Resumen de pagos</h2>
                    <div class="tableContainer">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th class="tdTypeAmount">Tipo de pago</th>
                                    <th class="tdAmount">Monto</th>
                                </tr>
                            </thead>
                            <tbody id="tBodyAmount"></tbody>
                        </table>
                    </div>
                </div>
                <div class="bodyRightColumn">
                    <div class="containerTotal">
                        <div class="lbl">Total:</div>
                        <div class="infoValue" id="total"></div>
                    </div>
                    <div class="containerDataAmount">
                        <div class="infoItem">
                            <div class="lbl">Abonado:</div>
                            <div class="infoValue" id="totalAmount"></div>
                        </div>
                        <div class="infoItem">
                            <div class="lbl">Deuda:</div>
                            <div class="infoValue danger" id="amountDue"></div>
                        </div>
                        <div class="percentageBar">
                            <div class="percentage" id="percentage"></div>
                        </div>
                        <div class="percentageInfo" id="percentageInfo"></div>
                    </div>
                </div>
                <div class="footerRightColumn">
                    <div class="formGroup">
                        <label for="txtNotes" class="lblInp">Notas adicionales</label>
                        <textarea id="txtNotes" class="txtInputs"></textarea>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/spareParts/controller/spareParts.view.controller.js"></script>
</body>

</html>
