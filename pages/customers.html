<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/utils/pagination.css">
    <link rel="stylesheet" href="../css/utils/controls/controls.css">
    <link rel="stylesheet" href="../css/utils/floatingMenu.css">
    <link rel="stylesheet" href="../css/utils/modals/modal.css">
    <link rel="stylesheet" href="../css/utils/showData/table.css">
    <link rel="stylesheet" href="../css/utils/loader.css">
    <link rel="stylesheet" href="../css/modules/customers/customers.css">
    <link rel="stylesheet" href="../css/utils/darkMode.css">

    <!-- ✅ AÑADIR: Script de inicialización -->
    <script src="../js/utils/dark.mode.init.js"></script>
    <title>Clientes</title>
</head>

<body>
    <div class="containerModal hide" id="modalCustomers">
        <form class="modalAdd" id="frmCustomers">
            <button id="closeAddCustomer" class="btnClose" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
                    <line x1="10" y1="10" x2="22" y2="22" stroke-width="2.5" stroke-linecap="round" />
                    <line x1="22" y1="10" x2="10" y2="22" stroke-width="2.5" stroke-linecap="round" />
                </svg>
            </button>
            <h2 class="titleModal">Agregar cliente</h2>
            <div class="modalCustomerBody">
                <div class="formGroup">
                    <label for="txtFullName" class="lblInputs">Nombre completo</label>
                    <input type="text" class="txtInputs" id="txtFullName" name="txtFullName" required maxlength="256">
                </div>
                <div class="formGroup">
                    <label for="txtCustomerDUI" class="lblInputs">DUI</label>
                    <input type="text" class="txtInputs" id="txtCustomerDUI" name="txtCustomerDUI" required
                        maxlength="10">
                </div>
                <div class="formGroup">
                    <label for="txtCustomerPhone" class="lblInputs">Teléfono</label>
                    <input type="text" class="txtInputs" id="txtCustomerPhone" name="txtCustomerPhone" required
                        maxlength="9">
                </div>
            </div>
            <button class="btnPrimary btnSubmitData btnAddData" id="btnAddNewCustomer">
                <span>Agregar</span>
                <div class="loader hide" id="loaderAddCustomer"></div>
            </button>
        </form>
    </div>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="containerMobileHeader"></div>
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a class="breadcrumb">Clientes</a>
                </div>
                <div class="filterSection">
                    <input type="text" id="txtSearchData" class="txtSearchData"
                        placeholder="Buscar por: nombre, Dui o teléfono">
                    <button id="openModalCustomer" class="btnPrimary btnOpenModal">Añadir</button>
                </div>
            </div>
            <div class="containerTable">
                <div class="containerLoader show" style="z-index: 10;" id="loaderCustomers">
                    <div class="loader"></div>
                    <div>Cargando lista de clientes...</div>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Nombre completo</th>
                            <th>Dui</th>
                            <th>Teléfono</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="CustomersTableBody">
                    </tbody>
                </table>
            </div>
            <div class="paginationContainer">

                <!-- Info + page size -->
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>

                    <div class="pageSize">
                        <select class="txtInputs" id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>

                <!-- Page controls -->
                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>

            </div>
        </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/customers/customers.controller.js"></script>
</body>

</html>
