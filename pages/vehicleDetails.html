<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../css/vehicleDetails.css">
    <title>Vehiculos</title>
</head>

<body>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="headerContent"></div>
            <div class="mainContent">
                <div class="vehicleDetailsContainer">
                    <div class="vehicleDetailsBody">
                        <div class="vehicleImagesSection">
                            <div class="swiper" id="mainSwiper">
                                <div class="swiper-wrapper">
                                    <div class="swiper-slide">Slide 1</div>
                                    <div class="swiper-slide">Slide 2</div>
                                    <div class="swiper-slide">Slide 3</div>
                                </div>

                                <div class="swiper-button-prev" style="color: var(--danger-color);"></div>
                                <div class="swiper-button-next" style="color: var(--danger-color);"></div>
                            </div>
                            <div class="thumbnailImagesContainer" id="thumbnailImagesContainer">
                                <!-- Miniaturas debajo -->
                                <div class="swiper thumbs-swiper" id="thumbsSwiper">
                                    <div class="swiper-wrapper">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="vehicleInfoSection">
                            <div class="headerInfoSection">
                                <h2 class="brand" id="brand"></h2>
                                <h3 class="price" id="price"></h3>
                            </div>
                            <div class="bodyInfoSection">
                                <div class="infoRow">
                                    <span class="infoLabel">Modelo:</span>
                                    <span class="infoValue" id="model"></span>
                                </div>
                                <div class="infoRow">
                                    <span class="infoLabel">Vin:</span>
                                    <span class="infoValue" id="vin"></span>
                                </div>
                                <div class="infoRow">
                                    <span class="infoLabel">Año:</span>
                                    <span class="infoValue" id="year"></span>
                                </div>
                                <div class="infoRow">
                                    <span class="infoLabel">Estado:</span>
                                    <span class="infoValue" id="status"></span>
                                </div>
                                <div class="infoRow">
                                    <span class="infoLabel">Cliente:</span>
                                    <span class="infoValue" id="customerName"></span>
                                </div>
                                <div class="infoRow">
                                    <span class="infoLabel">Dui del cliente:</span>
                                    <span class="infoValue" id="dui"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="../js/sidebar.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script type="module" src="../js/utils.js"></script>
        <script type="module" src="../js/controller/controllerVehicleDetails.js"></script>
        <script type="module" src="../js/service/serviceVehicleDetails.js"></script>
</body>

</html>
