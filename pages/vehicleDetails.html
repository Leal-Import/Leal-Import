<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../css/vehicleDetails.css">
    <title>Vehiculos</title>
</head>

<body>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <form class="content" id="frmVehicles">
            <div class="headerContent">
                <div class="breadcrumbSection">
                    <a href="vehicle.html" class="breadcrumb">Vehiculos ></a>
                    <a class="breadcrumb" id="typeAction">Agregar vehiculos</a>
                </div>
            </div>
            <div class="gridPlace">
                <div class="modalAdd hide" id="modalLinkLote">
                    <button class="btnClose" type="button">
                        <img src="../media/appMedia/closeIcon.svg" alt="">
                    </button>
                    <h2 class="titleModal">Agregar enlace del lote</h2>
                    <input type="text" id="txtLink" name="txtLink" class="txtInputs"
                        placeholder="Pega tu url aqui ej: https://www.ejemplo.com/lote/45" maxlength="1000">
                    <button class="btnPrimary btnSubmitData" id="btnSaveLinkLote" type="button">Guardar enlace</button>
                </div>
                <div class="containerModal hide" id="modalUpload">
                    <div class="modalAdd">
                        <button class="btnClose" type="button" id="btnCloseUpload">
                            <img src="../media/appMedia/closeIcon.svg" alt="">
                        </button>
                        <h2 class="titleModal" id="uploadTitle"></h2>
                        <div class="bodyModal">
                            <div class="dropArea" id="uploadDropArea">
                                <div class="dropContent">
                                    <span class="dropIcon">☁️</span>
                                    <p id="uploadDropText">Arrastra el archivo aquí</p>
                                </div>
                                <input type="file" id="uploadFileInput" hidden>
                            </div>

                            <button type="button" class="btnPrimary btnFullWidth" id="btnSelectFile">
                                Seleccionar archivo
                            </button>
                        </div>
                    </div>
                </div>

                <fieldset class="vehicleData">
                    <legend>Datos del vehiculo</legend>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtVin" class="lblInputs">Vin</label>
                            <input type="text" class="txtInputs" id="txtVin" name="txtVin" maxlength="50" required>
                        </div>
                        <div class="formGroup">
                            <label for="txtBrand" class="lblInputs">Marca</label>
                            <input type="text" class="txtInputs" id="txtBrand" name="txtBrand" maxlength="50" required>
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtModel" class="lblInputs">Modelo</label>
                            <input type="text" class="txtInputs" id="txtModel" name="txtModel" maxlength="50" required>
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtYear" class="lblInputs">Año</label>
                            <input type="text" class="txtInputs" id="txtYear" name="txtYear" maxlength="4" required>
                        </div>
                        <div class="formGroup">
                            <label for="txtMileage" class="lblInputs">Millaje</label>
                            <input type="text" class="txtInputs" id="txtMileage" name="txtMileage" maxlength="50" required>
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup" style="position: relative;">
                            <label for="txtLote" class="lblInputs">Lote</label>
                            <input type="text" class="txtInputs" id="txtLote" name="txtLote" maxlength="50" required>
                            <button class="btnLinkLote btnPrimary" type="button">Enlace</button>
                        </div>
                    </div>
                    <div class="formGroup">
                        <label for="txtDescription" class="lblInputs">Descripción</label>
                        <textarea type="text" class="txtInputs" id="txtDescription" name="txtDescription" rows="7" maxlength="1000"
                            style="flex: 1"></textarea>
                    </div>
                    <div class="formGroup groupCustomer hide" style="position: relative;">
                        <label for="txtCustomer" class="lblInputs">Cliente</label>
                        <input type="text" class="txtInputs" id="txtCustomer" name="txtCustomer" maxlength="50">
                        <div class="suggestions hide" id="suggestionsCustomer"></div>
                    </div>
                </fieldset>
                <div class="imgData">
                    <div class="vehicleImagesSection">
                        <div>
                            <div class="swiper" id="mainSwiper">
                                <div class="swiper-wrapper" id="mainSwiperWrapper"></div>
                                <div class="swiper-button-prev" style="color: var(--danger-color);"></div>
                                <div class="swiper-button-next" style="color: var(--danger-color);"></div>
                            </div>

                            <div class="thumbnailImagesContainer" id="thumbnailImagesContainer">
                                <div class="swiper thumbs-swiper" id="thumbsSwiper">
                                    <div class="swiper-wrapper" id="thumbsWrapper"></div>
                                </div>
                            </div>

                            <input type="file" id="imageInput" accept="image/*" multiple style="display:none;">
                        </div>
                    </div>
                </div>
                <fieldset class="costsData">
                    <legend>Costos de importacion</legend>
                    <div class="rowFields">
                        <div class="formGroup" style="position: relative;">
                            <label for="txtBill" class="lblInputs">Factura</label>
                            <input type="text" class="txtInputs txtCosts txtFormat" id="txtBill" name="txtBill" maxlength="11" required>
                            <button type="button" class="btnImgs btnPrimary" id="btnBill">+</button>
                        </div>
                        <div class="formGroup" style="position: relative;">
                            <label for="txtTaxes" class="lblInputs">Impuestos</label>
                            <input type="text" class="txtInputs txtCosts txtFormat" id="txtTaxes" name="txtTaxes" maxlength="11" required>
                            <button type="button" class="btnImgs btnPrimary" id="btnTaxes">+</button>
                        </div>
                        <div class="formGroup" style="position: relative;">
                            <label for="txtShip" class="lblInputs">Barco</label>
                            <input type="text" class="txtInputs txtCosts txtFormat" id="txtShip" name="txtShip" maxlength="11" required>
                            <button type="button" class="btnImgs btnPrimary btnsTransport">+</button>
                        </div>
                        <div class="formGroup" style="position: relative;">
                            <label for="txtTowTruck" class="lblInputs">Transporte</label>
                            <input type="text" class="txtInputs txtCosts txtFormat" id="txtTowTruck" name="txtTowTruck" maxlength="11" required>
                            <button type="button" class="btnImgs btnPrimary btnsTransport">+</button>
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtStorage" class="lblInputs">Almacenamiento</label>
                            <input type="text" class="txtInputs txtCosts txtFormat" id="txtStorage" name="txtStorage" maxlength="11" required>
                        </div>
                        <div class="formGroup">
                            <label for="txtTransfer" class="lblInputs">Transferencia</label>
                            <input type="text" class="txtInputs txtCosts txtFormat" id="txtTransfer" name="txtTransfer" maxlength="11" required>
                        </div>
                        <div class="formGroup">
                            <label for="txtIva" class="lblInputs">IVA</label>
                            <input type="text" class="txtInputs txtCosts txtFormat" id="txtIva" name="txtIva" maxlength="11" required>
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtPa" class="lblInputs">P.A</label>
                            <input type="text" class="txtInputs txtCosts txtFormat" id="txtPa" name="txtPa" maxlength="11" required>
                        </div>
                        <div class="formGroup">
                            <label for="txtSuggestedPrice" class="lblInputs">Precio sugerido</label>
                            <input type="text" class="txtInputs txtFormat" id="txtSuggestedPrice" name="txtSuggestedPrice" maxlength="11" required>
                        </div>
                        <div class="formGroup">
                            <label for="txtTotal" class="lblInputs">Total</label>
                            <input type="text" class="txtInputs" id="txtTotal" name="txtTotal" disabled>
                        </div>
                    </div>
                </fieldset>
            </div>
            <div class="containerOptions">
                <div class="isExternalContainer">
                    <span class="lbl">¿Es externo?</span>
                    <label class="switch">
                        <input type="checkbox" id="isExternalOpt">
                        <span class="slider"></span>
                    </label>
                </div>
                <input type="submit" value="Guardar" class="btnPrimary btnSubmitData" id="btnSaveData" style="padding: 10px 40px;">
            </div>
        </form>
        <script src="../js/sidebar.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script type="module" src="../js/modules/vehicles/controller/vehicles.detail.controller.js"></script>
</body>

</html>
