<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../css/vehicleDetails.css">
    <title>Vehiculos</title>
</head>

<body>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <form class="content" id="frmVehicles">
            <div class="headerContent">
                <div class="breadcrumbSection">
                    <a href="vehicle.html" class="breadcrumb">Vehiculos ></a>
                    <a class="breadcrumb" id="typeAction">Agregar vehiculos</a>
                </div>
            </div>
            <div>
                <div class="modalAdd hide" id="modalLink">
                    <button class="btnClose" type="button">
                        <img src="../media/appMedia/closeIcon.svg" alt="">
                    </button>
                    <h2 class="titleModal">Agregar enlace del lote</h2>
                    <input type="text" id="txtLink" class="txtInputs"
                        placeholder="Pega tu url aqui ej: https://www.ejemplo.com/lote/45" maxlength="1000">
                    <button class="btnPrimary btnSubmitData" id="btnSaveLink" type="button">Guardar enlace</button>
                </div>
                <!-- MODAL DE SUBIDA DE IMAGEN -->
                <div class="containerModal hide" id="modalBill">
                    <div class="modalAdd">
                        <button class="btnClose" type="button">
                            <img src="../media/appMedia/closeIcon.svg" alt="">
                        </button>
                        <h2 class="titleModal">Añadir comprobante de la factura</h2>
                        <div class="bodyModal">
                            <div id="dropArea" class="dropArea">
                                <div class="dropContent">
                                    <span class="dropIcon">☁️</span>
                                    <p>Arrastra el archivo aquí</p>
                                </div>
                                <input type="file" id="fileUploadInput" hidden>
                            </div>
                            <button type="button" class="btnPrimary btnFullWidth">Seleccionar archivo</button>
                        </div>
                    </div>
                </div>
                <div class="containerModal hide" id="modalShip">
                    <div class="modalAdd">
                        <button class="btnClose" type="button">
                            <img src="../media/appMedia/closeIcon.svg" alt="">
                        </button>
                        <h2 class="titleModal">Añadir comprobante del transporte</h2>
                        <div class="bodyModal">
                            <div id="dropAreaShip" class="dropArea">
                                <div class="dropContent">
                                    <span class="dropIcon">☁️</span>
                                    <p>Arrastra el archivo aquí</p>
                                </div>
                                <input type="file" id="fileUploadInputShip" hidden>
                            </div>
                            <button type="button" class="btnPrimary btnFullWidth">Seleccionar archivo</button>
                        </div>
                    </div>
                </div>
                <div class="containerModal hide" id="modalTaxes">
                    <div class="modalAdd">
                        <button class="btnClose" type="button">
                            <img src="../media/appMedia/closeIcon.svg" alt="">
                        </button>
                        <h2 class="titleModal">Añadir comprobante de los impuestos</h2>
                        <div class="bodyModal">
                            <div id="dropAreaTaxes" class="dropArea">
                                <div class="dropContent">
                                    <span class="dropIcon">☁️</span>
                                    <p>Arrastra el archivo aquí</p>
                                </div>
                                <input type="file" id="fileUploadInputTaxes" hidden>
                            </div>
                            <button type="button" class="btnPrimary btnFullWidth">Seleccionar archivo</button>
                        </div>
                    </div>
                </div>
                <fieldset class="vehicleData">
                    <legend>Datos del vehiculo</legend>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtVin" class="lblInputs">Vin</label>
                            <input type="text" class="txtInputs" id="txtVin" maxlength="50">
                        </div>
                        <div class="formGroup">
                            <label for="txtBrand" class="lblInputs">Marca</label>
                            <input type="text" class="txtInputs" id="txtBrand" maxlength="50">
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtModel" class="lblInputs">Modelo</label>
                            <input type="text" class="txtInputs" id="txtModel" maxlength="50">
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtYear" class="lblInputs">Año</label>
                            <input type="text" class="txtInputs" id="txtYear" maxlength="4">
                        </div>
                        <div class="formGroup">
                            <label for="txtMileage" class="lblInputs">Millaje</label>
                            <input type="text" class="txtInputs" id="txtMileage" maxlength="50">
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup" style="position: relative;">
                            <label for="txtLote" class="lblInputs">Lote</label>
                            <input type="text" class="txtInputs" id="txtLote" maxlength="50">
                            <button class="btnLink btnPrimary" type="button">Enlace</button>
                        </div>
                    </div>
                    <div class="formGroup">
                        <label for="txtDescription" class="lblInputs">Descripción</label>
                        <textarea type="text" class="txtInputs" id="txtDescription" rows="7" maxlength="1000"
                            style="flex: 1"></textarea>
                    </div>
                </fieldset>
                <div class="imgData">
                    <div class="vehicleImagesSection">
                        <div>
                            <div class="swiper" id="mainSwiper">
                                <div class="swiper-wrapper" id="mainSwiperWrapper"></div>
                                <div class="swiper-button-prev" style="color: var(--danger-color);"></div>
                                <div class="swiper-button-next" style="color: var(--danger-color);"></div>
                            </div>

                            <div class="thumbnailImagesContainer" id="thumbnailImagesContainer">
                                <div class="swiper thumbs-swiper" id="thumbsSwiper">
                                    <div class="swiper-wrapper" id="thumbsWrapper"></div>
                                </div>
                            </div>

                            <input type="file" id="imageInput" accept="image/*" multiple style="display:none;">
                        </div>
                    </div>
                </div>
                <fieldset class="costsData">
                    <legend>Costos de importacion</legend>
                    <div class="rowFields">
                        <div class="formGroup" style="position: relative;">
                            <label for="txtBill" class="lblInputs">Factura</label>
                            <input type="text" class="txtInputs txtCosts" id="txtBill" maxlength="11">
                            <button type="button" class="btnImgs btnPrimary" id="btnBill">+</button>
                        </div>
                        <div class="formGroup" style="position: relative;">
                            <label for="txtTaxes" class="lblInputs">Impuestos</label>
                            <input type="text" class="txtInputs txtCosts" id="txtTaxes" maxlength="11">
                            <button type="button" class="btnImgs btnPrimary" id="btnTaxes">+</button>
                        </div>
                        <div class="formGroup" style="position: relative;">
                            <label for="txtShip" class="lblInputs">Barco</label>
                            <input type="text" class="txtInputs txtCosts" id="txtShip" maxlength="11">
                            <button type="button" class="btnImgs btnPrimary btnsTransport">+</button>
                        </div>
                        <div class="formGroup" style="position: relative;">
                            <label for="txtTowTruck" class="lblInputs">Transporte</label>
                            <input type="text" class="txtInputs txtCosts" id="txtTowTruck" maxlength="11">
                            <button type="button" class="btnImgs btnPrimary btnsTransport">+</button>
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtStorage" class="lblInputs">Almacenamiento</label>
                            <input type="text" class="txtInputs txtCosts" id="txtStorage" maxlength="11">
                        </div>
                        <div class="formGroup">
                            <label for="txtTransfer" class="lblInputs">Transferencia</label>
                            <input type="text" class="txtInputs txtCosts" id="txtTransfer" maxlength="11">
                        </div>
                        <div class="formGroup">
                            <label for="txtIva" class="lblInputs">IVA</label>
                            <input type="text" class="txtInputs txtCosts" id="txtIva" maxlength="11">
                        </div>
                    </div>
                    <div class="rowFields">
                        <div class="formGroup">
                            <label for="txtPa" class="lblInputs">P.A</label>
                            <input type="text" class="txtInputs txtCosts" id="txtPa" maxlength="11">
                        </div>
                        <div class="formGroup">
                            <label for="txtSuggestedPrice" class="lblInputs">Precio sugerido</label>
                            <input type="text" class="txtInputs" id="txtSuggestedPrice" maxlength="11">
                        </div>
                        <div class="formGroup">
                            <label for="txtTotal" class="lblInputs">Total</label>
                            <input type="text" class="txtInputs" id="txtTotal" disabled>
                        </div>
                    </div>
                </fieldset>
            </div>
            <input type="submit" value="Guardar" class="btnPrimary btnSubmitData" style="padding: 10px 40px;">
        </form>
        <script src="../js/sidebar.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script type="module" src="../js/utils.js"></script>
        <script type="module" src="../js/service/serviceVehicleDetails.js"></script>
        <script type="module" src="../js/controller/controllerVehicleDetails.js"></script>
</body>

</html>
