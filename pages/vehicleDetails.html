    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <fieldset class="vehicleData">
                <legend>Datos del vehiculo</legend>
                <div class="rowFields">
                    <div class="formGroup">
                        <label for="txtVin" class="lblInputs">Vin</label>
                        <input type="text" class="txtInputs" id="txtVin">
                    </div>
                    <div class="formGroup">
                        <label for="txtBrand" class="lblInputs">Marca</label>
                        <input type="text" class="txtInputs" id="txtBrand">
                    </div>
                </div>
                <div class="rowFields">
                    <div class="formGroup">
                        <label for="txtModel" class="lblInputs">Modelo</label>
                        <input type="text" class="txtInputs" id="txtModel">
                    </div>
                    <div class="formGroup">
                        <label for="txtDescription" class="lblInputs">Descripción</label>
                        <input type="text" class="txtInputs" id="txtDescription">
                    </div>
                </div>
                <div class="rowFields">
                    <div class="formGroup">
                        <label for="txtYear" class="lblInputs">Año</label>
                        <input type="text" class="txtInputs" id="txtYear" maxlength="4">
                    </div>
                    <div class="formGroup">
                        <label for="txtMileage" class="lblInputs">Millaje</label>
                        <input type="text" class="txtInputs" id="txtMileage">
                    </div>
                </div>
                <div class="rowFields">
                    <div class="formGroup">
                        <label for="txtLote" class="lblInputs">Lote</label>
                        <input type="text" class="txtInputs" id="txtLote">
                    </div>
                    <div class="formGroup">
                        <label for="txtLote" class="lblInputs">s</label>
                        <input type="text" placeholder="Enlace" class="txtInputs">
                    </div>
                </div>
            </fieldset>
            <div class="imgData">
                <div class="vehicleImagesSection">
                    <div>
                        <div class="swiper" id="mainSwiper">
                            <div class="swiper-wrapper">
                                <div class="swiper-slide">Slide 1</div>
                                <div class="swiper-slide">Slide 2</div>
                                <div class="swiper-slide">Slide 3</div>
                            </div>
                            <div class="swiper-button-prev" style="color: var(--danger-color);"></div>
                            <div class="swiper-button-next" style="color: var(--danger-color);"></div>
                        </div>
                        <div class="thumbnailImagesContainer" id="thumbnailImagesContainer">
                            Miniaturas debajo
                            <div class="swiper thumbs-swiper" id="thumbsSwiper">
                                <div class="swiper-wrapper">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="costsData">
                <div class="formGroup">
                    <label for="txtBill" class="lblInputs">Factura</label>
                    <input type="text" class="txtInputs" id="txtBill">
                </div>
                <div class="formGroup">
                    <label for="txtTransfer" class="lblInputs">Transferencia</label>
                    <input type="text" class="txtInputs" id="txtTransfer">
                </div>
                <div class="formGroup">
                    <label for="txtStorage" class="lblInputs">Almacenamiento</label>
                    <input type="text" class="txtInputs" id="txtStorage">
                </div>
                <div class="formGroup">
                    <label for="txtTowTruck" class="lblInputs">Transporte</label>
                    <input type="text" class="txtInputs" id="txtTowTruck">
                </div>
                <div class="formGroup">
                    <label for="txtShip" class="lblInputs">Barco</label>
                    <input type="text" class="txtInputs" id="txtShip">
                </div>
                <div class="formGroup">
                    <label for="txtTaxes" class="lblInputs">Impuestos</label>
                    <input type="text" class="txtInputs" id="txtTaxes">
                </div>
                <div class="formGroup">
                    <label for="txtIva" class="lblInputs">IVA</label>
                    <input type="text" class="txtInputs" id="txtIva">
                </div>
                <div class="formGroup">
                    <label for="txtPa" class="lblInputs">P.A</label>
                    <input type="text" class="txtInputs" id="txtPa">
                </div>
                <div class="formGroup">
                    <label for="txtTotal" class="lblInputs">Total</label>
                    <input type="text" class="txtInputs" id="txtTotal">
                </div>
            </div>
        </div>
        <script src="../js/sidebar.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script type="module" src="../js/utils.js"></script>
        <script type="module" src="../js/controller/controllerVehicleDetails.js"></script>
        <script type="module" src="../js/service/serviceVehicleDetails.js"></script>
</body>

</html>
