<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../css/modules/spareParts/sparePartsForm.css">
    <link rel="stylesheet" href="../css/utils/controls/controls.css">
    <link rel="stylesheet" href="../css/utils/modals/modal.css">
    <link rel="stylesheet" href="../css/utils/modals/modalLinkExtra.css">
    <link rel="stylesheet" href="../css/utils/showData/carousel.css">
    <link rel="stylesheet" href="../css/utils/loaders/loader.css">
    <link rel="stylesheet" href="../css/utils/darkMode.css">

    <script src="../js/utils/dark.mode.init.js"></script>
    <title>Repuestos - Detalles</title>
</head>

<body>
    <div class="containerMobileHeader"></div>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <form class="content" id="frmSpareParts">
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a href="spareParts.html" class="breadcrumb" id="titleBread">Repuestos &#62; </a>
                    <a class="breadcrumb" id="typeAction">Agregar repuesto</a>
                </div>
            </div>

            <div class="wrapper">
                <!-- Modal para enlaces -->

                <div class="containerModal hide" id="modalLink">
                    <div class="modalAdd">
                        <button class="btnClose" type="button" id="btnCloseLink">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
                                <line x1="10" y1="10" x2="22" y2="22" stroke-width="2.5" stroke-linecap="round" />
                                <line x1="22" y1="10" x2="10" y2="22" stroke-width="2.5" stroke-linecap="round" />
                            </svg>
                        </button>
                        <div class="modalHeader">
                            <h2 class="titleModal" id="modalLinkTitle">Enlace del lote</h2>
                            <p class="subtitleModal">Ingresa la URL del lote que deseas vincular a este registro</p>
                        </div>

                        <div class="inputGroup">
                            <label for="txtLink" class="lblInputs">URL del lote</label>
                            <div class="inputWrapper">
                                <input type="url" id="txtLink" name="txtLink" class="txtInputs txtInputWithIcon"
                                    placeholder="https://www.ejemplo.com/lote/45" maxlength="1000">
                                <button class="btnPaste" type="button" id="btnPasteLote">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                    Pegar
                                </button>
                            </div>
                            <p class="helpText" id="defaultText">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg>
                                Debe ser una URL válida que comience con https://
                            </p>
                            <p class="errorMessage hide" id="errorLinkLote">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="8" x2="12" y2="12"></line>
                                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                </svg>
                                Por favor ingresa una URL válida
                            </p>
                            <p class="helpText successUrl hide" id="validateUrlMessage">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="8" x2="12" y2="12"></line>
                                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                </svg>
                                El enlace cumple con el formato requerido
                            </p>
                        </div>
                        <button class="btnPrimary btnSubmitData btnSaveLink" id="btnSaveLink" type="button">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            Guardar enlace
                        </button>
                    </div>
                </div>

                <!-- Sección de imagen -->
                <div class="imgData">
                    <div class="containerCarousel">
                        <div class="swiper" id="mainSwiper">
                            <div class="swiper-wrapper" id="mainSwiperWrapper"></div>
                            <div class="swiper-button-prev btnsCarousel hide" style="color: var(--danger-color);"></div>
                            <div class="swiper-button-next btnsCarousel hide" style="color: var(--danger-color);"></div>
                        </div>

                        <div class="thumbnailImagesContainer" id="thumbnailImagesContainer">
                            <div class="swiper thumbs-swiper" id="thumbsSwiper">
                                <div class="swiper-wrapper" id="thumbsWrapper"></div>
                            </div>
                        </div>

                        <input type="file" id="imageInput" accept="image/*" multiple style="display:none;">
                    </div>
                </div>
                <div class="sparePartDataContainer">
                    <!-- Datos del repuesto -->
                    <fieldset class="sparePartData">
                        <legend>Datos del repuesto</legend>
                        <div class="rowFields">
                            <div class="formGroup" style="position: relative;">
                                <label for="txtPartName" class="lblInputs">Nombre</label>
                                <input type="text" class="txtInputs" id="txtPartName" required name="txtPartName"
                                    placeholder="Ej: Filtro de aire" maxlength="250">
                                <button class="btnLink btnPrimary" type="button" id="btnOpenLinkBill">Enlace</button>
                            </div>
                            <div class="formGroup">
                                <label for="txtPartBrand" class="lblInputs">Marca</label>
                                <input type="text" class="txtInputs" id="txtPartBrand" required name="txtPartBrand"
                                    placeholder="Ej: Toyota, Honda" maxlength="50">
                            </div>
                        </div>
                        <div class="rowFields">
                            <div class="formGroup">
                                <label for="txtPartModel" class="lblInputs">Modelo</label>
                                <input type="text" class="txtInputs" id="txtPartModel" required name="txtPartModel"
                                    placeholder="Ej: Corolla 2020" maxlength="50">
                            </div>
                        </div>
                        <div class="rowFields">
                            <div class="formGroup">
                                <label for="txtPartYear" class="lblInputs">Año</label>
                                <input type="text" class="txtInputs" id="txtPartYear" required name="txtPartYear"
                                    placeholder="2024" maxlength="15">
                            </div>
                        </div>
                    </fieldset>

                    <!-- Costos de importación -->
                    <fieldset class="costsData">
                        <legend>Costos de importación</legend>
                        <div class="rowFields">
                            <div class="formGroup" style="position: relative;">
                                <label for="txtTracking" class="lblInputs">Tracking</label>
                                <input type="text" class="txtInputs" id="txtTracking" required name="txtTracking"
                                    placeholder="TRK-000000" maxlength="50">
                                <button class="btnLink btnPrimary" type="button"
                                    id="btnOpenLinkTracking">Enlace</button>
                            </div>
                            <div class="formGroup">
                                <label for="txtPurchasePrice" class="lblInputs">Precio de compra</label>
                                <input type="text" class="txtInputs txtCosts txtFormat" id="txtPurchasePrice" required
                                    name="txtPurchasePrice" placeholder="0.00" maxlength="11">
                            </div>
                            <div class="formGroup">
                                <label for="txtTaxes" class="lblInputs">Impuestos</label>
                                <input type="text" class="txtInputs txtCosts txtFormat" id="txtTaxes" required
                                    name="txtTaxes" placeholder="0.00" maxlength="11">
                            </div>
                        </div>
                        <div class="rowFields">
                            <div class="formGroup">
                                <label for="txtSuggestedPrice" class="lblInputs">Precio sugerido</label>
                                <input type="text" class="txtInputs txtFormat" id="txtSuggestedPrice" required
                                    name="txtSuggestedPrice" placeholder="0.00" maxlength="11">
                            </div>
                            <div class="formGroup">
                                <label for="txtTotalCost" class="lblInputs">Costo total</label>
                                <input type="text" class="txtInputs txtFormat" id="txtTotalCost" name="txtTotalCost"
                                    placeholder="0.00" maxlength="11" disabled>
                            </div>
                        </div>
                    </fieldset>
                </div>
            </div>
            <button class="btnPrimary btnSubmitData" id="btnSaveSparePart">
                <span>Guardar</span>
                <div class="loader hide" id="loaderAddSparePart"></div>
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/spareParts/sparePartsForm/spareParts.form.controller.js"></script>
    <script type="module" src="../js/components/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</body>

</html>
