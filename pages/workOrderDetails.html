<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/workOrdersDetails.css">
    <link rel="stylesheet" href="../css/pagination.css">
    <title>Ordenes</title>
</head>

<body>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a class="breadcrumb" href="workOrders.html">Ordenes > </a>
                    <a class="breadcrumb" id="vin">Yamaha ninja</a>
                </div>
                <div class="detailsWOSection">
                    <div class="infoItem">
                        <span class="lbl">Vin:</span>
                        <span class="valueItem">aldcndsocew</span>
                    </div>
                </div>
                <div class="statsSection">
                    <div class="statItem totalVehicle">
                        <p class="statTitle">Finalizadas</p>
                        <h2 class="statValue" id="finalized">0</h2>
                    </div>
                    <div class="statItem stockVehicles">
                        <p class="statTitle">Pendientes</p>
                        <h2 class="statValue" id="pending">0</h2>
                    </div>
                    <div class="statItem soldVehicles">
                        <p class="statTitle">Atrasadas</p>
                        <h2 class="statValue" id="delayed">0</h2>
                    </div>
                    <div class="statItem totalSales" style="flex: 2;">
                        <p class="statTitle statValue">Facturado</p>
                        <h2 class="statValue" id="totalOrdersQuantity">$283,384,384.93</h2>
                    </div>
                </div>
                <div class="filterSection">
                    <div class="filtersGroup">
                        <input type="text" id="txtSearchData" class="txtSearchData"
                            placeholder="Buscar por Empleado">
                        <select id="cmbSearchByStatus" class="cmbFilterData">
                            <option value="">Estado</option>
                        </select>
                    </div>
                    <a id="openModalCustomer" class="btnPrimary btnOpenModal">Añadir</a>
                </div>
            </div>
            <div class="containerTable">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Empleado</th>
                            <th>Cliente</th>
                            <th>Fecha registro</th>
                            <th>Estimada</th>
                            <th>Estado</th>
                            <th>Costo</th>
                            <th>Debe</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="woDetailsTBody">
                    </tbody>
                </table>
            </div>
            <div class="paginationContainer">

                <!-- Info + page size -->
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>

                    <div class="pageSize">
                        <select class="txtInputs" id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>

                <!-- Page controls -->
                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>

            </div>
        </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/utils.js"></script>
    <script type="module" src="../js/controller/controllerWODetails.js"></script>
    <script type="module" src="../js/service/serviceCustomers.js"></script>
</body>

</html>
