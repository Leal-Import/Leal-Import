<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/sales.css">
    <link rel="stylesheet" href="../css/pagination.css">
    <title>Ventas</title>
</head>

<body>
    <div class="containerModal hide" id="modalAskSale">
        <div class="modalAdd">
            <button id="btnCloseModalAsk" class="btnClose" type="button">
                <img src="../media/appMedia/closeIcon.svg" alt="">
            </button>
            <h2 class="titleModal">¿Que deseas vender?</h2>
            <div class="containerOptions">
                <a href="addCustomerSale.html?type=vehicle" class="optionSale">Vehiculo</a>
                <a href="addCustomerSale.html?type=sparePart" class="optionSale">Repuestos</a>
            </div>
        </div>
    </div>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a class="breadcrumb">Ventas</a>
                </div>
                <div class="dataCardContainer">
                    <div class="containerFilterType">
                        <div class="filterType" id="all">
                            <span>Todos</span>
                            <div class="lineSelected selected"></div>
                        </div>
                        <div class="filterType" id="vehicles">
                            <span>Vehiculos</span>
                            <div class="lineSelected"></div>
                        </div>
                        <div class="filterType" id="spareParts">
                            <span>Repuestos</span>
                            <div class="lineSelected"></div>
                        </div>
                    </div>
                    <div class="filterSectionSales">
                        <div class="filterSection">
                            <div class="filterContainer">
                                <input type="text" id="txtSearchData" class="txtSearchData"
                                    placeholder="Buscar por: cliente o vendedor">
                                <select id="cmbSearchByStatus" class="cmbFilterData">
                                    <option value="">Filtrar por estado</option>
                                </select>
                                <button class="btnPrimary btnOpenModal" id="btnAskSale">Añadir</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="panelContainer"></div>
            <div class="paginationContainer">

                <!-- Info + page size -->
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>

                    <div class="pageSize">
                        <select class="txtInputs" id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15" selected>15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>

                <!-- Page controls -->
                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>

            </div>
        </div>
    </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/utils.js"></script>
    <script type="module" src="../js/controller/controllerSales.js"></script>
    <script type="module" src="../js/service/serviceSales.js"></script>
</body>

</html>
