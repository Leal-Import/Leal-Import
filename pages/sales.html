<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/modules/sales/sales.css">
    <link rel="stylesheet" href="../css/utils/pagination.css">
    <link rel="stylesheet" href="../css/globalStyles.css">
    <link rel="stylesheet" href="../css/utils/controls/controls.css">
    <link rel="stylesheet" href="../css/utils/modals/modal.css">
    <link rel="stylesheet" href="../css/utils/loader.css">
    <title>Ventas</title>
</head>

<body>
    <!-- Modal Overlay -->
    <div class="containerModal hide" id="modalAskSale">
        <div class="modalAdd">
            <!-- Close Button -->
            <button class="btnClose" id="btnCloseModalAsk" type="button">
                <img src="../media/appMedia/closeIcon.svg" alt="">
            </button>

            <!-- Modal Header -->
            <div class="modalHeader">
                <h2 class="titleModal">¿Qué deseas vender?</h2>
                <p class="subtitleModal">Selecciona el tipo de producto que vas a vender</p>
            </div>

            <!-- Options Container -->
            <div class="containerOptions">
                <!-- Opción Vehículo -->
                <a href="addCustomerSale.html?type=vehicle" class="optionSale">
                    <div class="optionImageContainer">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2">
                            </path>
                        </svg>
                    </div>
                    <div class="optionContent">
                        <h3 class="titleOption">Vehículo</h3>
                        <p class="optionDescription">Registra la venta de un vehículo completo</p>
                    </div>
                </a>

                <!-- Opción Repuestos -->
                <a href="addCustomerSale.html?type=sparePart" class="optionSale">
                    <div class="optionImageContainer">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                    </div>
                    <div class="optionContent">
                        <h3 class="titleOption">Repuestos</h3>
                        <p class="optionDescription">Vende partes y accesorios automotrices</p>
                    </div>
                </a>
            </div>
        </div>
    </div>
    <div class="bodyContent">
        <div id="sidebar"></div>
        <div class="content">
            <div class="containerMobileHeader"></div>
            <div class="headerContent">
                <div class="breadCrumbSection">
                    <a class="breadcrumb">Ventas</a>
                </div>
                <div class="dataCardContainer">
                    <div class="containerFilterType">
                        <div class="filterType" data-value="" id="all">
                            <span>Todos</span>
                            <div class="lineSelected selected"></div>
                        </div>
                        <div class="filterType" data-value="Vehicle" id="vehicles">
                            <span>Vehiculos</span>
                            <div class="lineSelected"></div>
                        </div>
                        <div class="filterType" data-value="SparePart" id="spareParts">
                            <span>Repuestos</span>
                            <div class="lineSelected"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="filterSection">
                <input type="text" id="txtSearchData" class="txtSearchData"
                    placeholder="Buscar por: cliente o vendedor">
                <select id="cmbSearchByStatus" class="cmbFilterData">
                    <option value="">Cargando...</option>
                </select>
                <button class="btnPrimary btnOpenModal" id="btnAskSale">Añadir</button>
            </div>

            <div class="containerSales">
                <div class="containerLoader show" style="z-index: 20;" id="loaderSales">
                    <div class="loader"></div>
                    <div>Cargando lista de ventas...</div>
                </div>
                <div class="panelContainer"></div>
            </div>
            <div class="paginationContainer">

                <!-- Info + page size -->
                <div class="paginationLeft">
                    <span class="paginationInfo"></span>

                    <div class="pageSize">
                        <select id="sizeSelect">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15" selected>15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                        <span>por página</span>
                    </div>
                </div>

                <!-- Page controls -->
                <div class="paginationRight">
                    <button class="pageBtn prev">‹</button>
                    <button class="pageBtn next">›</button>
                </div>

            </div>
        </div>
    </div>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/modules/sales/sales.controller.js"></script>
</body>

</html>
